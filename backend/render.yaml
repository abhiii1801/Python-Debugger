services:
  - type: web
    name: tracer-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://tracer.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
