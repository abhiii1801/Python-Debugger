<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <img src="../icons/icon32.png" alt="Tracer" class="logo">
      <div>
        <div class="title">Tracer</div>
        <div class="subtitle">Visual Python Debugger</div>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div class="status" id="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Checking page...</span>
    </div>
    
    <button class="open-btn" id="open-tracer">
      Open Tracer
    </button>
    
    <div class="hint" id="hint">
      Navigate to a LeetCode problem to use the debugger
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
